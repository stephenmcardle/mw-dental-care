<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MW Dental Care</title>

    <!-- Global SEO fallbacks (per-page values injected by react-helmet-async) -->
    <meta name="description" content="Family and cosmetic dentistry in Easton, PA. Preventive, restorative, and cosmetic dental care for the whole family. Serving the Lehigh Valley since 2005." />

    <!-- Open Graph defaults (static — readable by social crawlers before JS runs) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MW Dental Care" />
    <meta property="og:image" content="https://mwdentalcare.net/og-image.png" />
    <meta property="og:image:width" content="1536" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="MW Dental Care — Family &amp; Cosmetic Dentistry in Easton, PA" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect for Google Maps (Contact page iframe) -->
    <link rel="preconnect" href="https://maps.googleapis.com" />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
